name: Validate

on:
  push:
  pull_request:

jobs:
  extension-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run validation suite
        run: npm run validate
